document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const __thumb = document.getElementById('__bundler_thumbnail');
    if (__thumb) { __thumb.style.opacity = '0'; await new Promise(function(r){ setTimeout(r, 180); }); }
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;700&display=swap\" rel=\"stylesheet\">\n<style>\n.btn { position:relative; display:inline-flex; align-items:center; gap:8px; border:none; border-radius:12px;\n  font-family: Arial, \"Noto Sans TC\", sans-serif; font-weight:600; font-size:15px; cursor:pointer; padding:14px 28px;\n  transition: transform .22s ease, box-shadow .22s ease, background-color .22s ease, opacity .22s ease; }\n.btn-primary { background:#1d2088; color:#fff; box-shadow:0 2px 8px rgba(29,32,136,.28); }\n.btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(29,32,136,.32); }\n.btn-primary:active:not(:disabled) { transform: translateY(0) scale(.97); box-shadow: 0 2px 6px rgba(29,32,136,.24); transition-duration:.1s; }\n.btn:disabled, .btn[aria-disabled=\"true\"] { cursor:not-allowed; opacity:.55; box-shadow:none; transform:none; }\n.btn.is-loading { pointer-events:none; }\n.btn.is-loading .btn-label-default, .btn.is-loading .btn-check { opacity:0; }\n.btn .btn-spinner { position:absolute; width:18px; height:18px; border:2.5px solid rgba(255,255,255,.4); border-top-color:#fff;\n  border-radius:50%; opacity:0; transform:scale(.6); transition:opacity .2s ease, transform .2s ease; }\n.btn.is-loading .btn-spinner { opacity:1; transform:scale(1); animation: btn-spin .7s linear infinite; }\n.btn-content { display:inline-flex; align-items:center; gap:8px; transition:opacity .2s ease; }\n@keyframes btn-spin { to { transform: rotate(360deg) scale(1); } }\n.btn.is-success .btn-check { opacity:1; transform:scale(1); }\n.btn.is-success .btn-label-default { display:none; }\n.btn .btn-check { width:18px; height:18px; opacity:0; transform:scale(.4);\n  transition:opacity .25s ease, transform .25s cubic-bezier(.34,1.56,.64,1); }\n<\u002Fstyle>\n\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"b2f6f423-e861-4b8e-bee1-928d1f61d17b\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n\n<script src=\"0fe27577-7c88-4f74-becd-588767f95d99\"><\u002Fscript>\n<script type=\"text/babel\" src=\"ca545fad-1abe-4dec-9a3f-c1eec1c819f5\"><\u002Fscript>\n<style>\n  body{margin:0;font-family:'Inter','Noto Sans TC',sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}\n  ::selection{background:rgba(29,32,136,.14);}\n  a{color:#1d2088;}\n  a:hover{color:#141a68;}\n  input:focus, button:focus-visible, a:focus-visible{outline:2px solid rgba(29,32,136,.45);outline-offset:2px;}\n  @keyframes fadeInStep{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;display:flex;flex-direction:column;background:#f4f5f7;color:#1c1c26;\">\n\n  <!-- Brand bar -->\n  <div style=\"position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:10px;padding:10px 16px;background:#fff;border-bottom:1px solid #e5e9f5;\">\n    <img src=\"2815e4c8-5fe3-4326-8fd5-2934329935a0\" alt=\"TACD\" style=\"height:32px;width:auto;display:block;flex-shrink:0;\">\n    <span style=\"font-size:16px;font-weight:800;color:#1d2088;letter-spacing:.5px;white-space:nowrap;\">\u53f0\u7063\u57fa\u5c64\u7cd6\u5c3f\u75c5\u5b78\u6703<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- Banner -->\n  <div style=\"width:100%;line-height:0;background:#f4f6ff;\">\n    <img src=\"3eaed212-2ecc-4abd-9425-7ab22c12014e\" alt=\"\u53f0\u7063\u57fa\u5c64\u7cd6\u5c3f\u75c5\u5b78\u6703 TACD - \u7cd6\u53cb\u75ab\u82d7\u885b\u6559\u8207\u65bd\u6253\u4fc3\u9032\u8a08\u756b\" style=\"width:100%;height:auto;display:block;max-height:260px;object-fit:cover;object-position:center;\">\n  <\u002Fdiv>\n\n  <main style=\"max-width:896px;margin:0 auto;padding:clamp(16px,4vw,32px) clamp(10px,3vw,16px);flex-grow:1;width:100%;box-sizing:border-box;\">\n\n    <!-- Progress stepper -->\n    <div style=\"margin-bottom:28px;background:#fff;padding:clamp(16px,3vw,24px);border-radius:16px;border:1px solid #e8e8ec;box-shadow:0 1px 3px rgba(16,24,40,0.04);\">\n      <div style=\"position:relative;max-width:640px;margin:0 auto;\">\n        <div style=\"position:absolute;left:0;right:0;top:0;height:40px;display:flex;align-items:center;z-index:0;\">\n          <div style=\"width:100%;height:3px;border-radius:2px;background:linear-gradient(90deg,#e5e7eb,#eef0f4);\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:absolute;left:0;right:0;top:0;height:40px;display:flex;align-items:center;z-index:0;\">\n          <div style=\"{{progressBarStyle}}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:relative;z-index:2;display:flex;justify-content:space-between;align-items:flex-start;gap:4px;\">\n          <sc-for list=\"{{steps}}\" as=\"step\" hint-placeholder-count=\"5\">\n            <div style=\"position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;cursor:pointer;flex:1;flex-shrink:0;min-width:0;\" sc-camel-on-click=\"{{step.onClick}}\" aria-current=\"{{step.ariaCurrent}}\" aria-label=\"{{step.ariaLabel}}\" role=\"button\" sc-camel-tab-index=\"0\">\n              <div style=\"{{step.circleStyle}}\" style-hover=\"{{step.circleHoverStyle}}\">\n                <sc-if value=\"{{step.isDone}}\"><img src=\"824e0659-fa38-4b9a-a974-7c5d71e71176\" alt=\"\u5df2\u5b8c\u6210\" style=\"width:100%;height:100%;object-fit:contain;border-radius:50%;\"><\u002Fsc-if>\n                <sc-if value=\"{{step.isNotDone}}\"><span>{{step.display}}<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n              <span style=\"{{step.labelStyle}}\">{{step.label}}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Main card -->\n    <div style=\"background:#fff;border-radius:24px;border:1px solid #e8e8ec;box-shadow:0 4px 24px rgba(16,24,40,0.06);padding:clamp(20px,4vw,40px) clamp(16px,4vw,40px);min-height:450px;display:flex;flex-direction:column;justify-content:space-between;position:relative;\">\n\n      <!-- Toast -->\n      <div style=\"{{toastStyle}}\" role=\"status\" aria-live=\"polite\">\u26a0 {{toastText}}<\u002Fdiv>\n\n      <!-- STEP 1: Consent form -->\n      <sc-if value=\"{{isStep1}}\">\n      <div style=\"animation:fadeInStep .35s ease;\">\n        <div style=\"width:100%;\">\n          <div ref=\"{{a4RefCallback}}\" style=\"width:100%;max-width:794px;background:#fff;box-shadow:0 8px 32px rgba(29,32,136,.18);border-radius:8px;padding:0 0 26px;display:flex;flex-direction:column;margin:0 auto;box-sizing:border-box;\">\n\n            <!-- header band -->\n            <div style=\"position:relative;background:linear-gradient(135deg,#1d2088 0%,#2d34b8 60%,#3b48d4 100%);padding:18px clamp(16px,4vw,38px) 14px;display:flex;align-items:center;flex-shrink:0;margin-bottom:16px;\">\n              <div style=\"max-width:calc(100% - 190px);box-sizing:border-box;\">\n                <div style=\"color: #fff; font-size: clamp(14px,3vw,17px); font-weight: 700; letter-spacing: .5px; line-height: 1.35; font-family: Arial\">{{a4HeaderTitle}}<\u002Fdiv>\n                <div style=\"color: rgba(255,255,255,.7); font-size: clamp(10px,2.4vw,12px); font-weight: 500; margin-top: 2px; max-width: 100%; font-family: Arial\">{{a4HeaderSub}}<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{exporting}}\">\n                <div style=\"position:absolute;top:14px;right:clamp(16px,4vw,38px);background:#f5f7fd;border:1px solid #dde3f5;border-radius:6px;padding:5px 11px;text-align:center;color:#1d2088;font-size:11px;font-weight:700;line-height:1.45;white-space:nowrap;\">\u53f0\u7063\u57fa\u5c64\u7cd6\u5c3f\u75c5\u5b78\u6703<br>Taiwan Association of Clinical Diabetes<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <div style=\"padding:0 clamp(14px,4vw,38px);display:flex;flex-direction:column;flex:1;\">\n\n              <!-- Intro card -->\n              <div style=\"background:#f0f4ff;border:1px solid #c7d2fe;border-radius:7px;padding:9px 13px 8px;margin-bottom:9px;page-break-inside:avoid;break-inside:avoid;\">\n                <div style=\"display:flex;flex-wrap:wrap;align-items:baseline;gap:3px 4px;margin-bottom:5px;line-height:1.5;\">\n                  <span style=\"font-size: 16px; font-weight: 600; color: #1c1c2e; white-space: nowrap; font-family: Arial\">\u672c\u4eba<\u002Fspan>\n                  <input value=\"{{patientName}}\" sc-camel-on-change=\"{{setPatientName}}\" type=\"text\" placeholder=\"\u8acb\u586b\u5beb\u7acb\u540c\u610f\u66f8\u4eba\" maxlength=\"20\" style=\"font-family: Arial; font-size: 16px; font-weight: 400; color: #1d2088; background: transparent; border: none; border-bottom: 1.5px solid #1d2088; outline: none; padding: 1px 8px; min-width: 150px; text-align: center\">\n                  <span style=\"font-size: 16px; font-weight: 600; color: #1c1c2e; white-space: nowrap; font-family: Arial\">\uff08\u7acb\u540c\u610f\u66f8\u4eba\uff09<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display: flex; flex-wrap: wrap; align-items: baseline; gap: 3px 4px; margin-bottom: 5px; line-height: 1.5; font-family: Arial\">\n                  <span style=\"font-size: 16px; font-weight: 600; color: #1c1c2e; white-space: nowrap; position: relative; font-family: Arial\">\u540c\u610f\u53c3\u8207\u7531<\u002Fspan>\n                  <span style=\"font-family: Arial; font-size: 16px; font-weight: 700; color: #1d2088; border-bottom: 1.5px solid #1d2088; padding: 2px 8px; white-space: nowrap\">\u53f0\u7063\u57fa\u5c64\u7cd6\u5c3f\u75c5\u5b78\u6703<\u002Fspan>\n                  <span style=\"font-size:16px;font-weight:600;color:#1c1c2e;white-space:nowrap;\">\uff08\u4ee5\u4e0b\u7c21\u7a31\u672c\u6703\uff09\u6240\u57f7\u884c\u4e4b<\u002Fspan>\n                <\u002Fdiv>\n                <p style=\"font-size: 16px; color: #4b5563; line-height: 1.65; margin-top: 7px; padding-top: 7px; border-top: 1px solid #c7d2fe; font-family: Arial\">\n                  \u7cd6\u5c3f\u75c5\u75c5\u53cb\u65b0\u51a0\u75ab\u82d7\u885b\u6559\u8207\u65bd\u6253\u4fc3\u9032\u8a08\u756b\uff08\u4ee5\u4e0b\u7c21\u7a31\u672c\u8a08\u756b\uff09\uff0c\u4e26\u540c\u610f\u672c\u6703\u4f9d\u64da\u4ee5\u4e0b\u689d\u6b3e\u8490\u96c6\u3001\u8655\u7406\u53ca\u5229\u7528\u672c\u4eba\u4e4b\u500b\u4eba\u8cc7\u6599\uff0c\u4ee5\u53ca\u63d0\u4f9b\u76f8\u95dc\u885b\u6559\u3001\u554f\u5377\u53ca\u8ffd\u8e64\u670d\u52d9\u3002\n                  \u7c3d\u7f72\u672c\u540c\u610f\u66f8\u50c5\u8868\u793a\u672c\u4eba\u540c\u610f\u53c3\u8207\u672c\u8a08\u756b\uff0c\u4e0d\u4ee3\u8868\u672c\u4eba\u5df2\u540c\u610f\u63a5\u7a2e\u75ab\u82d7\u3002\u662f\u5426\u63a5\u7a2e\u75ab\u82d7\uff0c\u4ecd\u7531\u672c\u4eba\u65bc\u63a5\u53d7\u91ab\u7642\u4eba\u54e1\u8a55\u4f30\u53ca\u8aaa\u660e\u5f8c\u81ea\u884c\u6c7a\u5b9a\uff1b\u5be6\u969b\u63a5\u7a2e\u6642\uff0c\u61c9\u4f9d\u91ab\u7642\u9662\u6240\u4e4b\u91ab\u7642\u7a0b\u5e8f\u53e6\u884c\u8fa6\u7406\u3002\n                <\u002Fp>\n              <\u002Fdiv>\n\n              <!-- Articles -->\n              <div style=\"display:flex;flex-direction:column;gap:14px;\">\n\n                <div style=\"position:relative;padding:12px 16px 12px 22px;background:linear-gradient(135deg,#f7f9ff 0%,#ffffff 65%);border:1px solid #e8ebf9;border-radius:14px;page-break-inside:avoid;break-inside:avoid;\">\n                  <div style=\"position:absolute;left:9px;top:14px;bottom:14px;width:4px;border-radius:99px;background:linear-gradient(180deg,#4c56dd 0%,#1d2088 100%);\"><\u002Fdiv>\n                  <h3 style=\"font-size: 16px; font-weight: 700; color: #1d2088; letter-spacing: .3px; margin: 0 0 6px; font-family: Arial\">\u7b2c\u4e00\u689d\uff1a\u8a08\u756b\u5167\u5bb9\u8207\u500b\u4eba\u8cc7\u6599\u8490\u96c6\u4e4b\u7bc4\u7587<\u002Fh3>\n                  <div style=\"font-size:16px;color:#4b5563;line-height:1.65;\">\n                    <p style=\"font-weight: 700; color: #1c1c2e; margin: 0 0 4px; font-family: Arial\">\u672c\u4eba\u540c\u610f\u53c3\u8207\u672c\u8a08\u756b\uff0c\u4e26\u63a5\u53d7\u91ab\u8b77\u4eba\u54e1\u9032\u884c\u7cd6\u5c3f\u75c5\u63a7\u5236\u72c0\u6cc1\u3001\u65b0\u51a0\u75ab\u82d7\u63a5\u7a2e\u8a55\u4f30\u8207\u76f8\u95dc\u5065\u5eb7\u885b\u6559\uff08\u5305\u542b\u96fb\u8a71\u8ffd\u8e64\u3001\u7c21\u8a0a\u63d0\u9192\u6216\u901a\u8a0a\u8edf\u9ad4\u95dc\u61f7\uff09\u3002<\u002Fp>\n                    <p style=\"margin: 0 0 4px; font-family: Arial\">\u70ba\u57f7\u884c\u672c\u8a08\u756b\u4e4b\u8cc7\u683c\u78ba\u8a8d\u3001\u885b\u6559\u4ecb\u5165\u3001\u524d\u5f8c\u554f\u5377\u8abf\u67e5\u3001\u63a5\u7a2e\u5b89\u6392\u3001\u8ffd\u8e64\u7ba1\u7406\u3001\u7d93\u8cbb\u6838\u92b7\u3001\u6210\u6548\u5206\u6790\u53ca\u7d71\u8a08\u7814\u7a76\uff0c\u672c\u6703\u53ca\u53c3\u8207\u9662\u6240\u5c07\u8490\u96c6\u3001\u8655\u7406\u53ca\u5229\u7528\u4e0b\u5217\u8cc7\u6599\uff1a<\u002Fp>\n                    <ul style=\"list-style:none;padding:0;margin:3px 0 0;display:flex;flex-direction:column;gap:4px;\">\n                      <li style=\"padding-left: 14px; position: relative; font-family: Arial\"><span style=\"position:absolute;left:0;top:3px;width:10px;height:10px;\"><img src=\"bbf8b28a-a2e8-4c0a-bee3-61076b0ee561\" alt=\"\" style=\"width: 16px; height: 17px; object-fit: contain\"><\u002Fspan><span style=\"font-weight:700;color:#1c1c2e;\">\u57fa\u672c\u8b58\u5225\u53ca\u806f\u7d61\u8cc7\u6599\uff1a<\u002Fspan>\u59d3\u540d\u3001\u51fa\u751f\u5e74\u6708\u65e5\u3001\u9662\u6240\u75c5\u6b77\u865f\u3001\u806f\u7d61\u96fb\u8a71\u53ca\u806f\u7d61\u5730\u5740\u3002<\u002Fli>\n                      <li style=\"padding-left: 14px; position: relative; font-family: Arial\"><span style=\"position:absolute;left:0; {{nextIconStyle}}\"><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <!-- Footer -->\n  <footer style=\"background:#0f172a;color:#94a3b8;padding:32px 16px;font-size:12px;border-top:1px solid #1e293b;\">\n    <div style=\"max-width:700px;margin:0 auto;text-align:center;display:flex;flex-direction:column;gap:12px;\">\n      <p style=\"font-weight:600;color:#cbd5e1;margin:0;\">\u00a9 2026 \u53f0\u7063\u57fa\u5c64\u7cd6\u5c3f\u75c5\u5b78\u6703 (Taiwan Association of Clinical Diabetes).<\u002Fp>\n      <p style=\"color:#64748b;line-height:1.6;margin:0;max-width:520px;margin-left:auto;margin-right:auto;\">\u672c\u7db2\u9801\u70ba\u7cd6\u53cb\u75ab\u82d7\u885b\u6559\u8207\u65bd\u6253\u4fc3\u9032\u8a08\u756b\u8a08\u756b\u5167\u90e8\u5c08\u7528\u5e73\u53f0\u3002\u7db2\u9801\u5167\u63d0\u4f9b\u4e4b\u5065\u5eb7\u5ba3\u5c0e\u8cc7\u8a0a\u50c5\u4f9b\u53c3\u8003\uff0c\u7121\u6cd5\u4ee3\u66ff\u5c08\u79d1\u91ab\u5e2b\u4e4b\u73fe\u5834\u8a3a\u65b7\u6216\u6cbb\u7642\u3002<\u002Fp>\n      <div style=\"display:flex;justify-content:center;gap:16px;color:#64748b;\">\n        <a href=\"#\" style=\"color:#64748b;\">\u96b1\u79c1\u6b0a\u4fdd\u8b77\u653f\u7b56<\u002Fa>\n        <span>|<\u002Fspan>\n        <a href=\"https://www.tacd.org.tw/ehc-tacd/s/index.htm\" target=\"_blank\" style=\"color:#64748b;\">\u806f\u7d61\u6211\u5011<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;showIcons&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Behavior&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    currentStep: 1,\n    patientName: '', phone: '', recordId: '',\n    dateYear: '', dateMonth: '', dateDay: '',\n    hasSignature: false,\n    toastVisible: false, toastText: '',\n    exporting: false,\n    downloadState: 'idle',\n  };\n\n  componentDidMount() {\n    const t = new Date();\n    this.setState({\n      dateYear: String(t.getFullYear() - 1911),\n      dateMonth: String(t.getMonth() + 1),\n      dateDay: String(t.getDate()),\n    });\n    this.drawing = false;\n    window.addEventListener('resize', this.resizeCanvas);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('resize', this.resizeCanvas);\n    clearTimeout(this._toastTimer);\n  }\n\n  goToStep = (n) => {\n    this.setState({ currentStep: n });\n    if (typeof window !== 'undefined') window.scrollTo({ top: 0, behavior: 'smooth' });\n  };\n\n  goPrev = () => { if (this.state.currentStep > 1) this.goToStep(this.state.currentStep - 1); };\n  goNext = () => { if (this.state.currentStep < 5) this.goToStep(this.state.currentStep + 1); };\n\n  showToast = (text) => {\n    this.setState({ toastVisible: true, toastText: text });\n    clearTimeout(this._toastTimer);\n    this._toastTimer = setTimeout(() => this.setState({ toastVisible: false }), 3000);\n  };\n\n  setField = (key) => (e) => this.setState({ [key]: e.target.value });\n\n  canvasRefCallback = (el) => {\n    if (!el) return;\n    this.canvasEl = el;\n    requestAnimationFrame(() => this.resizeCanvas());\n  };\n\n  resizeCanvas = () => {\n    const el = this.canvasEl;\n    if (!el) return;\n    const rect = el.parentNode.getBoundingClientRect();\n    if (!rect.width || !rect.height) return;\n    let backup = null;\n    if (this.state.hasSignature && el.width && el.height) {\n      try { backup = el.getContext('2d').getImageData(0, 0, el.width, el.height); } catch (e) {}\n    }\n    el.width = rect.width;\n    el.height = rect.height;\n    const ctx = el.getContext('2d');\n    ctx.strokeStyle = '#1d2088';\n    ctx.lineWidth = 3;\n    ctx.lineCap = 'round';\n    ctx.lineJoin = 'round';\n    if (backup) { try { ctx.putImageData(backup, 0, 0); } catch (e) {} }\n  };\n\n  getCoord = (e) => {\n    const el = this.canvasEl;\n    const rect = el.getBoundingClientRect();\n    let clientX, clientY;\n    if (e.touches && e.touches.length) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }\n    else { clientX = e.clientX; clientY = e.clientY; }\n    return { x: clientX - rect.left, y: clientY - rect.top };\n  };\n\n  startDraw = (e) => {\n    e.preventDefault();\n    this.drawing = true;\n    const ctx = this.canvasEl.getContext('2d');\n    const p = this.getCoord(e);\n    ctx.beginPath();\n    ctx.moveTo(p.x, p.y);\n  };\n\n  moveDraw = (e) => {\n    if (!this.drawing) return;\n    e.preventDefault();\n    const ctx = this.canvasEl.getContext('2d');\n    const p = this.getCoord(e);\n    ctx.lineTo(p.x, p.y);\n    ctx.stroke();\n    if (!this.state.hasSignature) this.setState({ hasSignature: true });\n  };\n\n  endDraw = () => { this.drawing = false; };\n\n  clearSignature = () => {\n    const el = this.canvasEl;\n    if (!el) return;\n    el.getContext('2d').clearRect(0, 0, el.width, el.height);\n    this.setState({ hasSignature: false });\n  };\n\n  a4RefCallback = (el) => { this.a4El = el; };\n\n  downloadConsent = () => {\n    if (typeof html2pdf === 'undefined') { this.showToast('PDF \u7522\u751f\u5143\u4ef6\u8f09\u5165\u4e2d\uff0c\u8acb\u7a0d\u5f8c\u518d\u8a66'); return; }\n    if (!this.state.hasSignature) this.showToast('\u5c1a\u672a\u7c3d\u540d\uff0c\u4ecd\u6703\u7522\u751f PDF');\n    const TARGET_BYTES = 450 * 1024;\n    // \u771f\u6b63\u7684 A4\uff0896dpi \u63db\u7b97\u7684 CSS px\uff09\uff1a\u5bec 794 \u9ad8 1123\uff0c\u5167\u5bb9\u7dad\u6301\u539f\u5c3a\u5bf8\u3001\u4f9d\u5167\u5bb9\u81ea\u7136\u5206\u9801\uff08\u4e0d\u7e2e\u5c0f\uff09\n    const PAGE_WIDTH = 794;\n    const PAGE_HEIGHT = 1123;\n    const attempts = [\n      { scale: 2,   quality: 0.85 },\n      { scale: 1.5, quality: 0.7 },\n      { scale: 1.2, quality: 0.55 },\n      { scale: 1,   quality: 0.4 },\n    ];\n    this.setState({ exporting: true, downloadState: 'loading' }, () => {\n      requestAnimationFrame(async () => {\n        const node = this.a4El;\n        const fname = ['\u53c3\u8207\u8a08\u756b\u540c\u610f\u66f8', this.state.patientName, this.state.recordId,\n          this.state.dateYear ? ('\u6c11\u570b' + this.state.dateYear + '\u5e74' + this.state.dateMonth + '\u6708' + this.state.dateDay + '\u65e5') : ''\n        ].filter(Boolean).join('_') + '.pdf';\n        try {\n          // \u7b49\u5f85\u7db2\u9801\u5b57\u578b\u5b8c\u5168\u8f09\u5165\uff0c\u907f\u514d\u64f7\u53d6\u756b\u9762\u6642\u5b57\u9ad4\u9084\u6c92\u5230\u4f4d\u9020\u6210\u6392\u7248\u8df3\u52d5\u3001\u6587\u5b57\u932f\u4f4d\n          if (document.fonts && document.fonts.ready) {\n            await Promise.race([document.fonts.ready, new Promise(function(r){ setTimeout(r, 800); })]);\n          }\n          let blob = null;\n          for (const opt of attempts) {\n            blob = await window.html2pdf().set({\n              margin: 0,\n              image: { type: 'jpeg', quality: opt.quality },\n              html2canvas: { scale: opt.scale, useCORS: true, backgroundColor: '#ffffff', windowWidth: PAGE_WIDTH },\n              jsPDF: { unit: 'px', format: [PAGE_WIDTH, PAGE_HEIGHT], orientation: 'portrait', compress: true },\n              // \u4f9d CSS page-break-inside:avoid \u81ea\u7136\u5206\u9801\uff1a\u6574\u584a\u689d\u6587/\u7c3d\u540d\u5340\u584a\u82e5\u653e\u4e0d\u4e0b\u5c31\u6574\u584a\u79fb\u5230\u4e0b\u4e00\u9801\uff0c\n              // \u4e0d\u6703\u5f9e\u6587\u5b57\u4e2d\u9593\u786c\u5207\uff0c\u540c\u6642\u5141\u8a31\u5167\u5bb9\u8d85\u904e\u4e00\u9801\u6642\u81ea\u7136\u7522\u751f\u7b2c\u4e8c\u9801\u3002\n              pagebreak: { mode: ['css'] },\n            }).from(node).outputPdf('blob');\n            if (blob.size <= TARGET_BYTES || opt === attempts[attempts.length - 1]) break;\n          }\n          const url = URL.createObjectURL(blob);\n          const a = document.createElement('a');\n          a.href = url; a.download = fname; document.body.appendChild(a); a.click(); a.remove();\n          URL.revokeObjectURL(url);\n          this.setState({ exporting: false, downloadState: 'success' });\n          if (blob.size > TARGET_BYTES) this.showToast('\u6a94\u6848\u5df2\u76e1\u91cf\u58d3\u7e2e\uff0c\u4ecd\u7565\u9ad8\u65bc 450KB\uff0c\u5efa\u8b70\u7cbe\u7c21\u5167\u5bb9\u6216\u7c3d\u540d\u5340\u584a');\n          clearTimeout(this._downloadResetTimer);\n          this._downloadResetTimer = setTimeout(() => this.setState({ downloadState: 'idle' }), 2000);\n        } catch (err) {\n          this.setState({ exporting: false, downloadState: 'idle' });\n          this.showToast('PDF \u7522\u751f\u5931\u6557\uff0c\u8acb\u7a0d\u5f8c\u518d\u8a66\u4e00\u6b21');\n        }\n      });\n    });\n  };\n\n  renderVals() {\n    const s = this.state;\n    const stepDefs = [\n      { num: 1, label: '\u540c\u610f\u66f8\u586b\u5beb' },\n      { num: 2, label: '\u885b\u6559\u3010\u524d\u3011\u554f\u5377' },\n      { num: 3, label: '\u885b\u6559\u8cc7\u8a0a' },\n      { num: 4, label: '\u885b\u6559\u3010\u5f8c\u3011\u554f\u5377' },\n      { num: 5, label: '\u4e0a\u50b3\u63a5\u7a2e\u7d00\u9304' },\n    ];\n    const steps = stepDefs.map((d) => {\n      const st = d.num < s.currentStep ? 'done' : d.num === s.currentStep ? 'current' : 'upcoming';\n      const circleStyle = st === 'upcoming'\n        ? { width: 40, height: 40, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: 16, background: '#fff', color: '#6b7280', border: '1px solid #e8e8ec', transition: 'all .3s', boxSizing: 'border-box' }\n        : st === 'done'\n        ? { width: 40, height: 40, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all .3s', overflow: 'hidden', background: '#fff', boxShadow: '0 2px 6px rgba(29,32,136,.25)' }\n        : { width: 40, height: 40, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: 16, background: '#1d2088', color: '#fff', transition: 'all .3s', boxShadow: '0 0 0 4px rgba(29,32,136,.12), 0 2px 8px rgba(29,32,136,.3)' };\n      const labelStyle = {\n        marginTop: 8, fontSize: 'clamp(10px,2.6vw,14px)', textAlign: 'center',\n        fontWeight: st === 'current' ? 800 : st === 'done' ? 600 : 500,\n        color: st === 'current' ? '#1c1c26' : st === 'done' ? '#1d2088' : '#6b7280',\n      };\n      return {\n        num: d.num, label: d.label, display: st === 'done' ? '\u2713' : String(d.num), circleStyle, labelStyle,\n        onClick: () => this.goToStep(d.num),\n        ariaCurrent: st === 'current' ? 'step' : undefined,\n        ariaLabel: `\u6b65\u9a5f ${d.num}\uff1a${d.label}${st === 'current' ? '\uff08\u76ee\u524d\u6b65\u9a5f\uff09' : st === 'done' ? '\uff08\u5df2\u5b8c\u6210\uff09' : ''}`,\n        circleHoverStyle: { transform: 'scale(1.08)' },\n        isDone: st === 'done',\n        isNotDone: st !== 'done',\n      };\n    });\n\n    const progressPercent = ((s.currentStep - 1) / 4) * 100;\n    const toastStyle = {\n      position: 'absolute', top: 16, left: '50%',\n      transform: s.toastVisible ? 'translate(-50%,0)' : 'translate(-50%,-80px)',\n      opacity: s.toastVisible ? 1 : 0,\n      background: '#e11d48', color: '#fff', fontSize: 14, fontWeight: 600,\n      padding: '12px 24px', borderRadius: 999, boxShadow: '0 8px 24px rgba(0,0,0,.15)',\n      transition: 'all .3s', zIndex: 50, whiteSpace: 'nowrap', pointerEvents: 'none',\n      left_: undefined,\n    };\n\n    const navBtnBase = { fontSize: 14, fontWeight: 600, padding: '10px 18px', borderRadius: 10, cursor: 'pointer', transition: 'all .18s', border: '1px solid #e8e8ec' };\n    const isFirstStep = s.currentStep === 1;\n    const isLastStep = s.currentStep === 5;\n\n    return {\n      showIcons: this.props.showIcons ?? true,\n      goPrev: this.goPrev, goNext: this.goNext,\n      isFirstStep, isLastStep,\n      prevButtonStyle: { ...navBtnBase, display: 'inline-flex', alignItems: 'center', gap: 8, background: isFirstStep ? '#f4f5f7' : '#fff', color: isFirstStep ? '#c3c7d1' : '#1c1c26', cursor: isFirstStep ? 'not-allowed' : 'pointer' },\n      prevIconStyle: { width: 14, height: 14, objectFit: 'contain', opacity: isFirstStep ? 0.4 : 1 },\n      nextButtonStyle: { ...navBtnBase, display: 'inline-flex', alignItems: 'center', gap: 8, background: isLastStep ? '#f4f5f7' : '#1d2088', color: isLastStep ? '#c3c7d1' : '#fff', border: 'none', cursor: isLastStep ? 'not-allowed' : 'pointer', boxShadow: isLastStep ? 'none' : '0 2px 8px rgba(29,32,136,0.25)' },\n      nextIconStyle: { width: 14, height: 14, objectFit: 'contain', filter: isLastStep ? 'invert(0.6)' : 'none', opacity: isLastStep ? 0.6 : 1 },\n      navButtonHoverStyle: { transform: 'translateY(-1px)' },\n      primaryHoverStyle: { transform: 'translateY(-2px)', boxShadow: '0 6px 18px rgba(29,32,136,0.32)' },\n      clearBtnHoverStyle: { background: '#475569' },\n      downloadBtnStateClass: s.downloadState === 'loading' ? 'is-loading' : s.downloadState === 'success' ? 'is-success' : '',\n      downloadBtnText: s.downloadState === 'loading' ? '\u7522\u751f\u4e2d\u2026' : s.downloadState === 'success' ? '\u5df2\u4e0b\u8f09' : '\u4e0b\u8f09\u540c\u610f\u66f8',\n      isStep1: s.currentStep === 1, isStep2: s.currentStep === 2, isStep3: s.currentStep === 3,\n      isStep4: s.currentStep === 4, isStep5: s.currentStep === 5,\n      steps,\n      progressBarStyle: { height: 3, borderRadius: 2, background: 'linear-gradient(90deg,#1d2088,#4c56dd)', transition: 'width .5s', width: progressPercent + '%' },\n      toastStyle, toastText: s.toastText,\n      stepIndicatorText: `\u6b65\u9a5f ${s.currentStep} / 5`,\n      a4HeaderTitle: s.exporting ? '\u53c3\u8207\u8a08\u756b\u540c\u610f\u66f8' : '\u7b2c\u4e00\u6b65\u9a5f\uff1a\u540c\u610f\u66f8\u586b\u5beb',\n      a4HeaderSub: s.exporting ? '\u7cd6\u5c3f\u75c5\u75c5\u53cb\u65b0\u51a0\u75ab\u82d7\u885b\u6559\u8207\u65bd\u6253\u4fc3\u9032\u8a08\u756b' : '\u8aaa\u660e\uff1a\u540c\u610f\u66f8\u53ef\u63a1\u7d19\u672c\u7c3d\u7f72\u6216\u7dda\u4e0a\u96fb\u5b50\u7c3d\u540d\u65b9\u5f0f\uff0c\u4e26\u8acb\u65bc\u8a08\u756b\u622a\u6b62\u65e5\u524d\uff0c\u5c07100\u540d\u53c3\u8207\u8005\u540c\u610f\u66f8\u5f59\u6574\u70ba\u55ae\u4e00PDF\u6a94\u6848\u5f8c\uff0c\u4e0a\u50b3\u81f3\u7cfb\u7d71\u4e2d\u3002',\n      exporting: s.exporting,\n      patientName: s.patientName, phone: s.phone, recordId: s.recordId,\n      dateYear: s.dateYear, dateMonth: s.dateMonth, dateDay: s.dateDay,\n      setPatientName: this.setField('patientName'),\n      setPhone: this.setField('phone'),\n      setRecordId: this.setField('recordId'),\n      setDateYear: this.setField('dateYear'),\n      setDateMonth: this.setField('dateMonth'),\n      setDateDay: this.setField('dateDay'),\n      canvasRefCallback: this.canvasRefCallback,\n      a4RefCallback: this.a4RefCallback,\n      startDraw: this.startDraw, moveDraw: this.moveDraw, endDraw: this.endDraw,\n      clearSignature: this.clearSignature,\n      downloadConsent: this.downloadConsent,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
